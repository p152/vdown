services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: vdown
      POSTGRES_USER: vdown
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vdown_secret}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vdown -d vdown"]
      interval: 5s
      timeout: 5s
      retries: 5

  vidbee-api:
    image: ghcr.io/nexmoe/vidbee-api:latest
    restart: unless-stopped
    environment:
      VIDBEE_API_HOST: 0.0.0.0
      VIDBEE_API_PORT: 3100
      VIDBEE_DOWNLOAD_DIR: /data/downloads
      VIDBEE_HISTORY_STORE_PATH: /data/vidbee/vidbee.db
    volumes:
      - vidbee-downloads:/data/downloads
      - vidbee-data:/data/vidbee
      - ./cookies:/data/cookies
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3100/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: "true"
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
      - vidbee-downloads:/data/downloads:ro
    ports:
      - "8081:8081"

  bot:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "bot.main"]
    env_file: .env
    environment:
      VIDBEE_API_URL: http://vidbee-api:3100
      TELEGRAM_BOT_API_URL: http://telegram-bot-api:8081
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://vdown:${POSTGRES_PASSWORD:-vdown_secret}@postgres:5432/vdown
      DOWNLOADS_DIR: /data/downloads
    volumes:
      - vidbee-downloads:/data/downloads
      - ./cookies:/data/cookies
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      vidbee-api:
        condition: service_healthy
      telegram-bot-api:
        condition: service_started

  worker:
    build: .
    restart: unless-stopped
    command: ["arq", "bot.services.queue.WorkerSettings"]
    env_file: .env
    environment:
      VIDBEE_API_URL: http://vidbee-api:3100
      TELEGRAM_BOT_API_URL: http://telegram-bot-api:8081
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://vdown:${POSTGRES_PASSWORD:-vdown_secret}@postgres:5432/vdown
      DOWNLOADS_DIR: /data/downloads
    volumes:
      - vidbee-downloads:/data/downloads
      - ./cookies:/data/cookies
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      vidbee-api:
        condition: service_healthy
      telegram-bot-api:
        condition: service_started

  api:
    build: .
    restart: unless-stopped
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8080"]
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://vdown:${POSTGRES_PASSWORD:-vdown_secret}@postgres:5432/vdown
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy

volumes:
  redis-data:
  postgres-data:
  vidbee-downloads:
  vidbee-data:
  telegram-bot-api-data:
